# ═══════════════════════════════════════════════════════
# NorthStream IPTV — Nginx Config
# Optimized for: TTFB, Gzip, Brotli, Cache Headers, SEO
# ═══════════════════════════════════════════════════════

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── GZIP COMPRESSION ────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xhtml+xml
        application/font-woff
        application/font-woff2
        image/svg+xml;

    # ── SECURITY HEADERS (good for SEO trust signals) ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Strict Transport Security (HTTPS only)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';" always;

    # ── CACHE CONTROL ───────────────────────────────────
    # HTML — no cache (always fresh for SEO)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Robots-Tag "index, follow";
    }

    # Static assets — long cache
    location ~* \.(css|js|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images — medium cache
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── SEO FILES ────────────────────────────────────────
    location = /robots.txt {
        add_header Content-Type text/plain;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /sitemap.xml {
        add_header Content-Type application/xml;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── HEALTH CHECK (Cloud Run requirement) ────────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    # ── SPA ROUTING (for future Vue/React pages) ────────
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ── CUSTOM ERROR PAGES ──────────────────────────────
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # ── REMOVE SERVER SIGNATURE ─────────────────────────
    server_tokens off;

    # ── ACCESS LOG FORMAT ───────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
}
